<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kepala Sekolah - Absensi Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof tailwind !== 'undefined') { tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', }, darkBg: '#0f172a', darkCard: '#1e293b', darkBorder: '#334155' }, borderRadius: { '2xl': '1rem', '3xl': '1.5rem', } } } } }
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); const icon = document.getElementById('theme-icon'); if (icon) icon.classList.replace('fa-moon', 'fa-sun'); }
        });
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(15, 23, 42, 0.85); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-darkBg dark:text-slate-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="glass fixed w-full top-0 z-[60] border-b border-slate-200/60 dark:border-slate-700/50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14 items-center">
                <div class="flex items-center gap-3 cursor-pointer group" onclick="window.location.href='index.html'">
                    <div class="w-9 h-9 bg-primary-600 rounded-lg flex items-center justify-center text-white shadow-md group-hover:scale-105 transition-transform"><i class="fas fa-graduation-cap text-lg"></i></div>
                    <div class="hidden sm:block"><h1 class="font-extrabold text-base leading-tight tracking-tight dark:text-white">Digital Presence</h1></div>
                </div>
                <div class="flex items-center gap-2 sm:gap-3">
                    <button onclick="toggleTheme()" class="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border border-transparent hover:border-slate-200 dark:hover:border-slate-700"><i id="theme-icon" class="fas fa-moon text-sm text-slate-500 dark:text-slate-400"></i></button>
                    <div id="nav-user-info"></div>
                    <button onclick="logout()" class="bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md shadow-rose-500/20 transition-all active:scale-95">Keluar</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-20 pb-10 px-4 max-w-7xl mx-auto w-full">
        <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 translate-y-20 opacity-0 pointer-events-none">
            <div class="bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 px-4 py-3 rounded-xl shadow-xl flex items-center gap-2 border border-slate-700 dark:border-slate-200">
                <div class="w-5 h-5 bg-green-500 rounded-full flex items-center justify-center text-[9px]"><i class="fas fa-check text-white"></i></div>
                <span id="toast-message" class="font-bold text-xs truncate max-w-xs">Berhasil</span>
            </div>
        </div>

        <section class="animate-in">
            <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 mb-6 dark:text-white text-slate-900">
                <div>
                    <h2 class="text-2xl sm:text-3xl font-black tracking-tight">Monitoring <span class="text-primary-600">Sekolah</span></h2>
                    <p class="text-slate-400 font-medium text-sm mt-1">Monitoring kehadiran dan jurnal pengajaran harian.</p>
                </div>
                <div class="flex flex-col sm:flex-row items-center gap-3 w-full xl:w-auto overflow-x-auto no-scrollbar pb-2 xl:pb-0">
                    <button onclick="manualRefresh(this)" class="bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 px-4 py-1.5 rounded-lg font-bold shadow-sm flex items-center justify-center gap-1.5 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all text-xs shrink-0 w-full sm:w-auto"><i class="fas fa-sync-alt"></i> Refresh</button>
                    <div class="bg-white dark:bg-darkCard p-1 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 flex shrink-0 w-full sm:w-auto">
                        <button onclick="switchKepsekTab('rekap')" id="tab-k-rekap" class="flex-1 sm:flex-none px-4 py-1.5 rounded-md bg-primary-600 text-white font-bold shadow-sm transition-all flex items-center justify-center gap-1.5 text-xs whitespace-nowrap"><i class="fas fa-chart-bar"></i> Rekap 1-8</button>
                        <button onclick="switchKepsekTab('jurnal')" id="tab-k-jurnal" class="flex-1 sm:flex-none px-4 py-1.5 rounded-md text-slate-500 dark:text-slate-400 font-bold transition-all hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center justify-center gap-1.5 text-xs whitespace-nowrap"><i class="fas fa-book"></i> Jurnal</button>
                        <button onclick="switchKepsekTab('siswa')" id="tab-k-siswa" class="flex-1 sm:flex-none px-4 py-1.5 rounded-md text-slate-500 dark:text-slate-400 font-bold transition-all hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center justify-center gap-1.5 text-xs whitespace-nowrap"><i class="fas fa-users"></i> Riwayat Siswa</button>
                    </div>
                </div>
            </div>

            <div id="kepsek-filter-panel" class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700 mb-6">
                <div class="flex flex-col md:flex-row gap-5 items-end text-slate-900 dark:text-white">
                    <div class="w-full md:w-56">
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Pilih Tanggal</label>
                        <input type="date" id="filter-kepsek-date" class="w-full px-4 py-2 rounded-xl bg-slate-50 dark:bg-slate-900/50 dark:text-white border border-slate-200 dark:border-slate-700 focus:border-primary-500 outline-none text-sm font-semibold" onchange="loadKepsekData()">
                    </div>
                    <div class="flex-grow">
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Filter Ruang Kelas</label>
                        <div id="kepsek-class-container" class="flex flex-wrap gap-2"></div>
                        <input type="hidden" id="filter-kepsek-class" value="ALL">
                    </div>
                </div>
            </div>

            <div id="kepsek-tab-rekap" class="animate-in"><div id="kepsek-stats-container" class="mb-8"></div></div>

            <div id="kepsek-tab-jurnal" class="hidden animate-in">
                <div class="bg-white dark:bg-darkCard rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left min-w-[1000px]">
                            <thead class="bg-slate-50/50 dark:bg-slate-800/50 text-[10px] font-black uppercase text-slate-400 whitespace-nowrap">
                                <tr><th class="px-5 py-3 text-center w-16">Jam</th><th class="px-5 py-3 w-24">Kelas</th><th class="px-5 py-3 w-64">Guru & Mapel</th><th class="px-5 py-3">Materi & Foto</th><th class="px-5 py-3 text-center w-24">Hadir (%)</th></tr>
                            </thead>
                            <tbody id="table-kepsek-logs" class="divide-y dark:divide-slate-700/50 dark:text-white"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="kepsek-tab-siswa" class="hidden animate-in">
                <div class="bg-white dark:bg-darkCard rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700 overflow-hidden">
                    <div class="p-5 border-b dark:border-slate-700 flex flex-col md:flex-row gap-4 justify-between items-center text-slate-900 dark:text-white">
                        <div class="relative w-full max-w-sm"><i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i><input type="text" id="kepsek-siswa-search" placeholder="Cari nama siswa..." class="w-full pl-9 pr-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900/50 dark:text-white border border-slate-200 dark:border-slate-700 outline-none focus:border-primary-500 text-sm font-semibold" onkeyup="filterKepsekStudents()"></div>
                    </div>
                    <div class="overflow-x-auto"><table class="w-full text-left whitespace-nowrap min-w-[600px]"><thead class="bg-slate-50/50 dark:bg-slate-800/50 text-[10px] font-black uppercase text-slate-400"><tr><th class="px-5 py-3">NIS</th><th class="px-5 py-3">Nama Lengkap</th><th class="px-5 py-3 text-center">Kelas</th><th class="px-5 py-3 text-right">Aksi</th></tr></thead><tbody id="table-kepsek-siswa" class="divide-y dark:divide-slate-700/50 dark:text-white"></tbody></table></div>
                    <div id="pagination-kepsek-students" class="p-5 border-t dark:border-slate-700 flex flex-col sm:flex-row justify-between items-center gap-4 text-slate-400"></div>
                </div>
            </div>
        </section>

        <!-- Modals -->
        <div id="modal-siswa-history" class="fixed inset-0 bg-slate-900/60 z-[100] hidden flex items-center justify-center backdrop-blur-sm transition-all duration-300 opacity-0 p-4">
            <div class="bg-white dark:bg-darkCard rounded-2xl w-full max-w-5xl shadow-2xl max-h-[94vh] flex flex-col dark:text-white border dark:border-slate-700 overflow-y-auto">
                <div class="sticky top-0 bg-white dark:bg-darkCard z-20 p-5 border-b dark:border-slate-700 flex justify-between items-start text-slate-900 dark:text-white">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-primary-100 dark:bg-primary-900/40 rounded-xl flex items-center justify-center text-primary-600 shrink-0"><i class="fas fa-user-graduate text-xl"></i></div>
                        <div>
                            <h3 class="text-xl font-black tracking-tight text-slate-900 dark:text-white" id="history-student-name">Nama Siswa</h3>
                            <div class="flex flex-wrap gap-2 mt-1.5"><span class="bg-slate-100 dark:bg-slate-800 px-2.5 py-0.5 rounded-md text-[10px] font-bold text-slate-500 uppercase tracking-widest border dark:border-slate-700" id="history-student-nis">NIS: -</span><span class="bg-primary-50 dark:bg-primary-900/30 px-2.5 py-0.5 rounded-md text-[10px] font-bold text-primary-600 uppercase tracking-widest border border-primary-100 dark:border-primary-800/30" id="history-student-class">Kelas: -</span></div>
                        </div>
                    </div>
                    <button onclick="closeModal('modal-siswa-history')" class="w-10 h-10 rounded-lg bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400 hover:text-rose-500"><i class="fas fa-times text-lg"></i></button>
                </div>
                <div class="p-5 space-y-6">
                    <div class="flex gap-4 items-end border-b dark:border-slate-700 pb-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-400 tracking-[0.1em] mb-2">Periode Laporan</label>
                            <div class="flex gap-2">
                                <select id="history-month-select" class="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-2 rounded-lg font-bold outline-none dark:text-white text-xs" onchange="updateMonthlyStats()"></select>
                                <select id="history-year-select" class="bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-2 rounded-lg font-bold outline-none dark:text-white text-xs" onchange="updateMonthlyStats()"></select>
                            </div>
                        </div>
                    </div>
                    <div class="flex-grow overflow-hidden">
                        <div class="bg-slate-50/50 dark:bg-slate-800/50 px-5 py-3 rounded-t-xl border-x border-t dark:border-slate-700"><h4 class="text-xs font-bold uppercase tracking-wider text-slate-500">Kehadiran Harian</h4></div>
                        <div class="rounded-b-xl border dark:border-slate-700 overflow-x-auto no-scrollbar">
                            <table class="w-full text-left whitespace-nowrap min-w-[600px]"><thead class="border-b dark:border-slate-700"><tr class="font-bold text-[9px] uppercase text-slate-400 tracking-wider"><th rowspan="2" class="px-5 py-3 border-b border-r dark:border-slate-700 align-middle">Hari & Tanggal</th><th colspan="8" class="px-5 py-2 border-b dark:border-slate-700 text-center">Hadir Jam Ke-</th></tr><tr><th class="px-3 py-2 border-b border-l dark:border-slate-700 text-center w-10">1</th><th class="px-3 py-2 border-b border-l dark:border-slate-700 text-center w-10">2</th><th class="px-3 py-2 border-b border-l dark:border-slate-700 text-center w-10">3</th><th class="px-3 py-2 border-b border-l dark:border-slate-700 text-center w-10">4</th><th class="px-3 py-2 border-b border-l dark:border-slate-700 text-center w-10">5</th><th class="px-3 py-2 border-b border-l dark:border-slate-700 text-center w-10">6</th><th class="px-3 py-2 border-b border-l dark:border-slate-700 text-center w-10">7</th><th class="px-3 py-2 border-b border-l dark:border-slate-700 text-center w-10">8</th></tr></thead><tbody id="table-siswa-history-modal-body" class="divide-y dark:divide-slate-700"></tbody></table>
                            <div id="history-empty-view" class="hidden py-16 flex-col items-center justify-center text-center"><i class="fas fa-calendar-times text-4xl text-slate-200 dark:text-slate-700 mb-3 block"></i><p class="text-slate-400 font-bold text-sm">Belum ada rekaman absensi.</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const GOOGLE_MACRO_URL = "https://script.google.com/macros/s/AKfycbzaxciHd1EHF368DFD0Sv0Gmk-1QnSsl-ffEbuOEr08OVnKVbbx5cnsLXkiYzAJcI7hlw/exec"; 
        let db = { users: [], subjects: [], students: [], attendance: [], classLogs: [] };
        let currentUser = null, currentHistoryStudentId = null, currentKepsekStudentPage = 1, studentsPerPage = 20;

        const getTodayStr = () => { const tzoffset = (new Date()).getTimezoneOffset() * 60000; return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0]; };
        const extractDate = (dateVal) => { if (!dateVal) return ''; let d = String(dateVal); return d.includes('T') ? d.split('T')[0] : d.trim(); };

        function toggleTheme() {
            const html = document.documentElement; html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            const icon = document.getElementById('theme-icon');
            if(icon) { if(html.classList.contains('dark')) icon.classList.replace('fa-moon', 'fa-sun'); else icon.classList.replace('fa-sun', 'fa-moon'); }
        }

        window.onload = async () => {
            currentUser = JSON.parse(sessionStorage.getItem('absensi_user'));
            if (!currentUser || currentUser.role !== 'kepsek') {
                window.location.href = 'index.html'; // Usir jika bukan kepsek
                return;
            }
            
            const badgeClass = 'bg-purple-100 text-purple-600';
            document.getElementById('nav-user-info').innerHTML = `<div class="flex items-center gap-2"><div class="hidden sm:block text-right"><p class="text-[11px] font-black uppercase tracking-tight text-slate-900 dark:text-white leading-none mb-0.5">${currentUser.name}</p><span class="px-1.5 py-0.5 rounded text-[8px] font-black uppercase tracking-widest ${badgeClass}">${currentUser.role}</span></div><div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center border-2 border-white dark:border-slate-700 shadow-sm"><i class="fas fa-user-circle text-slate-400 text-lg"></i></div></div>`;
            
            const localDb = localStorage.getItem('absensi_db');
            if (localDb) { db = JSON.parse(localDb); loadKepsekData(); }
            fetchInitialData();
        };

        async function fetchInitialData() {
            try {
                const response = await fetch(GOOGLE_MACRO_URL + "?action=getAllData");
                const result = await response.json();
                db.users = (result.users || []).map(u => ({ ...u, id: String(u.id), role: String(u.role || u.Role || '').toLowerCase(), name: u.name || u.Nama || 'Staff', mapel_id: u.mapel_id || u.Mapel_id || '' }));
                db.subjects = (result.subjects || []).map(m => ({ ...m, id: String(m.id), name: m.name || m.Nama || 'Tanpa Nama' }));
                db.students = (result.students || []).map(s => ({ ...s, id: String(s.id && s.id !== 'undefined' ? s.id : (s.nis || s.NIS || 's'+Math.random())), nis: String(s.nis || s.NIS || ''), name: s.name || s.Nama || s['Nama Lengkap'] || 'Siswa', class: s.class || s.Kelas || s.kelas || '' }));
                db.attendance = (result.attendance || []).map(a => ({ ...a, date: extractDate(a.date || a.tanggal), period: String(a.period || a.jam || ''), status: a.status || a.Status || '', student_id: a.student_id, mapel_id: a.mapel_id, teacher_id: a.teacher_id }));
                db.classLogs = (result.classLogs || []).map(l => ({ ...l, date: extractDate(l.date || l.tanggal), period: String(l.period || l.jam || ''), class: l.class || l.Kelas || '', material: l.material || l.materi || '', photo: l.photo || '', teacher_id: l.teacher_id, mapel_id: l.mapel_id }));
                localStorage.setItem('absensi_db', JSON.stringify(db));
                loadKepsekData();
            } catch (err) { console.error("Cloud sync fail:", err); }
        }

        function logout() { sessionStorage.removeItem('absensi_user'); window.location.href = 'index.html'; }
        function openModal(id) { const m = document.getElementById(id); if(m) { m.classList.remove('hidden'); setTimeout(() => m.classList.replace('opacity-0', 'opacity-100'), 10); } }
        function closeModal(id) { const m = document.getElementById(id); if(m) { m.classList.replace('opacity-100', 'opacity-0'); setTimeout(() => m.classList.add('hidden'), 300); } }

        function switchKepsekTab(tab) {
            ['rekap', 'jurnal', 'siswa'].forEach(t => { const el = document.getElementById('kepsek-tab-' + t); if(el) el.classList.add('hidden'); const btn = document.getElementById('tab-k-' + t); if(btn) btn.className = "flex-1 sm:flex-none px-4 py-1.5 rounded-md text-slate-500 dark:text-slate-400 font-bold transition-all hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center justify-center gap-1.5 text-xs whitespace-nowrap"; });
            const target = document.getElementById('kepsek-tab-' + tab); if(target) target.classList.remove('hidden');
            const activeBtn = document.getElementById('tab-k-' + tab); if(activeBtn) activeBtn.className = "flex-1 sm:flex-none px-4 py-1.5 rounded-md bg-primary-600 text-white font-bold shadow-sm transition-all flex items-center justify-center gap-1.5 text-xs whitespace-nowrap";
            if (tab === 'siswa') loadKepsekStudents(); loadKepsekData(); 
        }

        function loadKepsekData() {
            const dateInput = document.getElementById('filter-kepsek-date'); if (!dateInput.value) dateInput.value = getTodayStr(); const dateVal = dateInput.value;
            const cls = document.getElementById('filter-kepsek-class').value, container = document.getElementById('kepsek-class-container');
            if (container && !container.dataset.populated) {
                const classes = [...new Set(db.students.map(s => s.class))].filter(Boolean).sort();
                container.innerHTML = `<button onclick="setKepsekClass('ALL')" class="px-4 py-1.5 rounded-lg border font-bold text-xs transition-all ${cls==='ALL'?'bg-primary-600 text-white border-primary-600 shadow-sm':'bg-white dark:bg-slate-800 text-slate-500 border-slate-200 dark:border-slate-700'}">Semua Kelas</button>` + classes.map(c => `<button onclick="setKepsekClass('${c}')" class="px-4 py-1.5 rounded-lg border font-bold text-xs transition-all ${cls===c?'bg-primary-600 text-white border-primary-600 shadow-sm':'bg-white dark:bg-slate-800 text-slate-500 border-slate-200 dark:border-slate-700'}">${c}</button>`).join('');
                container.dataset.populated = 'true';
            }
            
            let filtered = db.attendance.filter(a => a.date === dateVal);
            let targetStudents = db.students; if (cls !== 'ALL') targetStudents = targetStudents.filter(s => s.class === cls); 
            targetStudents.sort((a,b) => { if(a.class === b.class) return a.name.localeCompare(b.name); return a.class.localeCompare(b.class); });

            let statsHTML = `<div class="bg-white dark:bg-darkCard rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700 overflow-hidden"><div class="overflow-x-auto no-scrollbar"><table class="w-full text-left whitespace-nowrap min-w-[800px]"><thead class="bg-slate-50/50 dark:bg-slate-800/80 text-[10px] font-black uppercase text-slate-400"><tr><th rowspan="2" class="px-5 py-3 border-b border-r dark:border-slate-700 w-12 text-center align-middle">No</th><th rowspan="2" class="px-5 py-3 border-b border-r dark:border-slate-700 align-middle">Nama Siswa</th><th rowspan="2" class="px-5 py-3 border-b border-r dark:border-slate-700 text-center align-middle">Kelas</th><th colspan="8" class="px-5 py-2 border-b dark:border-slate-700 text-center">Hadir Jam Ke-</th></tr><tr>${[1,2,3,4,5,6,7,8].map(p => `<th class="px-3 py-2 border-b border-l dark:border-slate-700 text-center w-10">${p}</th>`).join('')}</tr></thead><tbody class="divide-y dark:divide-slate-700/50 dark:text-white text-xs">`;
            if (targetStudents.length === 0) statsHTML += `<tr><td colspan="11" class="py-16 text-center text-slate-300 font-bold text-sm">Tidak ada data siswa.</td></tr>`;
            else {
                targetStudents.forEach((s, index) => {
                    statsHTML += `<tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-colors"><td class="px-5 py-3 text-center border-r dark:border-slate-700/50 text-slate-400 font-bold">${index + 1}</td><td class="px-5 py-3 border-r dark:border-slate-700/50 font-bold text-sm">${s.name}</td><td class="px-5 py-3 border-r dark:border-slate-700/50 text-center text-xs font-bold text-primary-600">${s.class}</td>`;
                    for(let i=1; i<=8; i++) {
                        const att = filtered.find(a => String(a.student_id) === String(s.id) && String(a.period) === String(i));
                        let cellContent = '-', cellClass = 'bg-slate-100 dark:bg-slate-800 text-slate-300 dark:text-slate-600'; 
                        if(att) { if(att.status === 'H') { cellClass = 'bg-green-500 text-white font-bold shadow-sm'; cellContent = 'H'; } else if(att.status === 'I') { cellClass = 'bg-blue-500 text-white font-bold shadow-sm'; cellContent = 'I'; } else if(att.status === 'S') { cellClass = 'bg-yellow-500 text-white font-bold shadow-sm'; cellContent = 'S'; } else if(att.status === 'A') { cellClass = 'bg-rose-500 text-white font-bold shadow-sm'; cellContent = 'A'; } }
                        statsHTML += `<td class="px-2 py-3 text-center border-l dark:border-slate-700/50"><div class="w-6 h-6 mx-auto rounded-md flex items-center justify-center text-[10px] ${cellClass}">${cellContent}</div></td>`;
                    } statsHTML += `</tr>`;
                });
            } statsHTML += `</tbody></table></div></div>`;
            document.getElementById('kepsek-stats-container').innerHTML = statsHTML;
            
            let logs = db.classLogs.filter(l => l.date === dateVal && (cls === 'ALL' || l.class === cls));
            const tableLogs = document.getElementById('table-kepsek-logs');
            if(tableLogs) tableLogs.innerHTML = logs.length ? logs.map(l => {
                const g = db.users.find(u => u.id === l.teacher_id), m = db.subjects.find(x => x.id === l.mapel_id);
                const atts = db.attendance.filter(a => a.date === dateVal && String(a.period) === String(l.period) && a.teacher_id === l.teacher_id && a.mapel_id === l.mapel_id), hadir = atts.filter(a=>a.status==='H').length, total = atts.length, perc = total ? Math.round((hadir/total)*100) : 0;
                let photoThumbnail = '';
                if (l.photo && l.photo.length > 10) {
                    const cleanUrl = l.photo.replace(/^'/, '').trim();
                    if (cleanUrl.startsWith('http')) {
                        const match = cleanUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                        if (match && match[1]) { const imgUrl = `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400`; photoThumbnail = `<div class="mt-4"><a href="${cleanUrl}" target="_blank" class="block w-32 h-20 overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700 hover:border-primary-500 transition-colors shadow-sm bg-slate-50 dark:bg-slate-800 relative group"><img src="${imgUrl}" alt="Foto" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110"></a></div>`; } 
                        else photoThumbnail = `<div class="mt-4"><a href="${cleanUrl}" target="_blank" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 text-blue-600 dark:bg-blue-900/30 rounded-lg text-[10px] font-bold"><i class="fas fa-external-link-alt"></i> Buka Foto</a></div>`;
                    } else if (cleanUrl.startsWith('data:image')) photoThumbnail = `<div class="mt-4"><a href="${cleanUrl}" target="_blank" download="Foto_Kelas.jpg" class="block w-32 h-20 overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm"><img src="${cleanUrl}" alt="Foto" class="w-full h-full object-cover hover:scale-110 transition-transform duration-300"></a></div>`;
                } else photoThumbnail = `<div class="mt-3 text-[9px] text-slate-400 font-bold italic border border-dashed border-slate-300 rounded-md px-2.5 py-1 inline-block">Tanpa Foto</div>`;
                return `<tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-colors whitespace-nowrap"><td class="px-5 py-4 text-center align-top"><span class="w-7 h-7 mx-auto rounded-md bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-black text-xs mt-1">${l.period}</span></td><td class="px-5 py-4 font-black text-sm text-primary-600 align-top pt-5">${l.class}</td><td class="px-5 py-4 align-top pt-5"><div class="flex items-center gap-2"><span class="font-bold text-sm">${m?m.name:'-'}</span><span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider border-l dark:border-slate-600 pl-2">${g?g.name:'-'}</span></div></td><td class="px-5 py-4 align-top min-w-[250px]"><p class="text-sm font-medium text-slate-700 dark:text-slate-300 whitespace-pre-wrap break-words leading-relaxed">${l.material.replace(/^'/, '')}</p>${photoThumbnail}</td><td class="px-5 py-4 text-center text-sm font-black align-top pt-5">${perc}%</td></tr>`;
            }).join('') : `<tr><td colspan="5" class="py-16 text-center text-slate-300 font-bold text-sm">Belum ada aktivitas tercatat.</td></tr>`;
        }

        function filterKepsekStudents() { currentKepsekStudentPage = 1; loadKepsekStudents(); }
        function changeKepsekStudentPage(p) { currentKepsekStudentPage = p; loadKepsekStudents(); }
        function loadKepsekStudents() {
            const search = document.getElementById('kepsek-siswa-search').value.toLowerCase(), cls = document.getElementById('filter-kepsek-class').value;
            let filteredS = db.students.filter(s => (cls === 'ALL' || s.class === cls) && (s.name.toLowerCase().includes(search) || s.nis.includes(search)));
            const total = filteredS.length, pages = Math.ceil(total / studentsPerPage); currentKepsekStudentPage = Math.max(1, Math.min(currentKepsekStudentPage, pages || 1));
            const paginated = filteredS.slice((currentKepsekStudentPage - 1) * studentsPerPage, currentKepsekStudentPage * studentsPerPage);
            const tableSiswa = document.getElementById('table-kepsek-siswa');
            if(tableSiswa) tableSiswa.innerHTML = paginated.map(s => `<tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-colors whitespace-nowrap"><td class="px-5 py-3 text-xs font-bold text-slate-400">${s.nis}</td><td class="px-5 py-3 text-sm font-bold">${s.name}</td><td class="px-5 py-3 text-center"><span class="px-2.5 py-1 rounded-md bg-primary-50 dark:bg-primary-900/30 text-primary-600 text-[10px] font-bold border border-primary-100">${s.class}</span></td><td class="px-5 py-3 text-right"><button onclick="showStudentHistory('${s.id}')" class="bg-primary-50 dark:bg-primary-900/30 text-primary-600 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide hover:bg-primary-600 hover:text-white transition-all shadow-sm">Lihat Riwayat <i class="fas fa-chevron-right ml-1"></i></button></td></tr>`).join('');
            const pagContainer = document.getElementById('pagination-kepsek-students');
            if (pagContainer) pagContainer.innerHTML = `<span class="text-xs font-bold text-slate-400">${total} Siswa</span><div class="flex gap-1">` + Array.from({length: pages}, (_, i) => i + 1).filter(p => p === 1 || p === pages || Math.abs(p - currentKepsekStudentPage) <= 1).map(p => `<button onclick="changeKepsekStudentPage(${p})" class="w-7 h-7 rounded-md font-bold text-xs ${p===currentKepsekStudentPage ? 'bg-primary-600 text-white' : 'bg-slate-100 dark:bg-slate-800'}">${p}</button>`).join('') + `</div>`;
        }

        function showStudentHistory(studentId) {
            currentHistoryStudentId = studentId; const student = db.students.find(s => String(s.id) === String(studentId)); if (!student) return;
            document.getElementById('history-student-name').textContent = student.name; document.getElementById('history-student-nis').textContent = `NIS: ${student.nis}`; document.getElementById('history-student-class').textContent = `Kelas: ${student.class}`;
            const monthSelect = document.getElementById('history-month-select'), yearSelect = document.getElementById('history-year-select'), months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"], now = new Date();
            if (monthSelect.options.length === 0) {
                monthSelect.innerHTML = months.map((m, i) => `<option value="${i+1}" ${i === now.getMonth() ? 'selected' : ''}>${m}</option>`).join('');
                let yearOptions = ''; for (let y = 2024; y <= 2100; y++) yearOptions += `<option value="${y}" ${y === now.getFullYear() ? 'selected' : ''}>Tahun ${y}</option>`; yearSelect.innerHTML = yearOptions;
            }
            updateMonthlyStats(); openModal('modal-siswa-history');
        }

        function updateMonthlyStats() {
            if (!currentHistoryStudentId) return; const monthInput = parseInt(document.getElementById('history-month-select').value), yearInput = parseInt(document.getElementById('history-year-select').value);
            const filtered = db.attendance.filter(a => { if (String(a.student_id) !== String(currentHistoryStudentId)) return false; const parts = String(a.date).split('-'); if (parts.length < 2) return false; return parseInt(parts[0]) === yearInput && parseInt(parts[1]) === monthInput; });
            const tbody = document.getElementById('table-siswa-history-modal-body'), emptyView = document.getElementById('history-empty-view');
            if (filtered.length > 0) {
                emptyView.style.display = 'none'; tbody.parentElement.classList.remove('hidden');
                const dates = [...new Set(filtered.map(a => a.date))].sort((a, b) => b.localeCompare(a));
                tbody.innerHTML = dates.map(dateStr => {
                    const dt = new Date(dateStr), days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'], dtParts = dateStr.split('-');
                    let rowHtml = `<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors whitespace-nowrap"><td class="px-5 py-3 font-bold text-xs text-slate-700 dark:text-slate-300 border-r dark:border-slate-700/50">${days[dt.getDay()]}, ${dtParts[2]}/${dtParts[1]}/${dtParts[0]}</td>`;
                    for (let i = 1; i <= 8; i++) {
                        const att = filtered.find(a => a.date === dateStr && String(a.period) === String(i));
                        let cellContent = '-', cellClass = 'bg-slate-100 dark:bg-slate-800 text-slate-300 dark:text-slate-600';
                        if (att) { if (att.status === 'H') { cellClass = 'bg-green-500 text-white font-bold shadow-sm'; cellContent = 'H'; } else if (att.status === 'I') { cellClass = 'bg-blue-500 text-white font-bold shadow-sm'; cellContent = 'I'; } else if (att.status === 'S') { cellClass = 'bg-yellow-500 text-white font-bold shadow-sm'; cellContent = 'S'; } else if (att.status === 'A') { cellClass = 'bg-rose-500 text-white font-bold shadow-sm'; cellContent = 'A'; } }
                        rowHtml += `<td class="px-2 py-3 text-center border-l dark:border-slate-700/50"><div class="w-6 h-6 mx-auto rounded-md flex items-center justify-center text-[10px] ${cellClass}">${cellContent}</div></td>`;
                    } rowHtml += `</tr>`; return rowHtml;
                }).join('');
            } else { tbody.innerHTML = ''; tbody.parentElement.classList.add('hidden'); emptyView.style.display = 'flex'; emptyView.classList.remove('hidden'); }
        }

        function setKepsekClass(c) { document.getElementById('filter-kepsek-class').value = c; document.getElementById('kepsek-class-container').dataset.populated = ''; loadKepsekData(); if (!document.getElementById('kepsek-tab-siswa').classList.contains('hidden')) { currentKepsekStudentPage = 1; loadKepsekStudents(); } }
        async function manualRefresh(btn) { const org = btn.innerHTML; btn.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> Memuat...'; btn.disabled = true; await fetchInitialData(); btn.innerHTML = org; btn.disabled = false; showToast("Data ter-update!"); }
        function showToast(m) { const t = document.getElementById('toast'), msg = document.getElementById('toast-message'); if (t && msg) { msg.textContent = m; t.classList.replace('translate-y-20', 'translate-y-0'); t.classList.replace('opacity-0', 'opacity-100'); t.classList.remove('pointer-events-none'); setTimeout(() => { t.classList.replace('translate-y-0', 'translate-y-20'); t.classList.replace('opacity-100', 'opacity-0'); t.classList.add('pointer-events-none'); }, 3000); } }
    </script>
</body>
