<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital - SMP Negeri 9 Kota Bima</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', }, darkBg: '#0f172a', darkCard: '#1e293b', darkBorder: '#334155' }, borderRadius: { '2xl': '1rem', '3xl': '1.5rem', } } } }
            }
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                const icon = document.getElementById('theme-icon');
                if (icon) icon.classList.replace('fa-moon', 'fa-sun');
            }
        });
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(15, 23, 42, 0.85); }
        .hide { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-darkBg dark:text-slate-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="glass fixed w-full top-0 z-[60] border-b border-slate-200/60 dark:border-slate-700/50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14 items-center">
                <div class="flex items-center gap-3 cursor-pointer group" onclick="navigate('home')">
                    <div class="w-9 h-9 bg-primary-600 rounded-lg flex items-center justify-center text-white shadow-md group-hover:scale-105 transition-transform">
                        <i class="fas fa-graduation-cap text-lg"></i>
                    </div>
                    <div class="hidden sm:block">
                        <h1 class="font-extrabold text-base leading-tight tracking-tight dark:text-white">Digital Presence</h1>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 sm:gap-3">
                    <button onclick="toggleTheme()" class="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                        <i id="theme-icon" class="fas fa-moon text-sm text-slate-500 dark:text-slate-400"></i>
                    </button>
                    
                    <button id="btn-login" onclick="navigate('login')" class="bg-slate-900 dark:bg-white dark:text-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md hover:opacity-90 transition-all active:scale-95">
                        <i class="fas fa-user-circle mr-1.5"></i>Login
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow pt-20 pb-10 px-4 max-w-7xl mx-auto w-full">
        <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 translate-y-20 opacity-0 pointer-events-none">
            <div class="bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 px-4 py-3 rounded-xl shadow-xl flex items-center gap-2 border border-slate-700 dark:border-slate-200">
                <div class="w-5 h-5 bg-green-500 rounded-full flex items-center justify-center text-[9px]"><i class="fas fa-check text-white"></i></div>
                <span id="toast-message" class="font-bold text-xs truncate max-w-xs">Berhasil</span>
            </div>
        </div>

        <!-- Home / Search Section -->
        <section id="view-home" class="animate-in min-h-[75vh] flex flex-col justify-center items-center">
            <div class="text-center mb-8 max-w-xl">
                <h2 class="text-3xl sm:text-4xl font-extrabold mb-3 tracking-tight leading-tight dark:text-white">Cari Tahu Kehadiran <span class="text-primary-600">Siswa</span></h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Layanan transparansi absensi harian untuk wali murid.</p>
            </div>
            <div class="w-full max-w-xl px-4">
                <form id="search-form" class="relative group" onsubmit="event.preventDefault(); searchStudent();">
                    <div class="absolute inset-0 bg-primary-500/10 blur-xl group-focus-within:bg-primary-500/20 transition-all rounded-2xl"></div>
                    <div class="relative flex items-center p-1.5 bg-white dark:bg-darkCard rounded-2xl border border-slate-200 dark:border-slate-700 shadow-xl focus-within:border-primary-500 transition-all">
                        <i class="fas fa-search text-slate-400 ml-3 text-sm"></i>
                        <input type="text" id="search-input" placeholder="Masukkan NIS atau Nama Siswa..." class="w-full py-2.5 px-3 bg-transparent outline-none text-sm font-semibold placeholder:text-slate-400 dark:text-white">
                        <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition-all shadow-md active:scale-95">Cari</button>
                    </div>
                </form>
                <div id="search-results" class="mt-6 hidden animate-in bg-white dark:bg-darkCard rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700 p-6">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-5 border-b dark:border-slate-700 pb-4 text-slate-900 dark:text-white">
                        <div>
                            <h3 class="text-xl font-black" id="result-name"></h3>
                            <div class="flex gap-2 mt-1.5">
                                <span class="bg-primary-50 text-primary-600 dark:bg-primary-900/30 px-2.5 py-0.5 rounded-full text-[10px] font-bold" id="result-class"></span>
                                <span class="text-slate-400 text-[10px] font-bold uppercase tracking-wider mt-0.5">NIS: <span id="result-nis"></span></span>
                            </div>
                        </div>
                        <div class="bg-slate-50 dark:bg-slate-800 px-3 py-1.5 rounded-lg border dark:border-slate-700 text-center">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">Hari Ini</p>
                            <p class="font-bold text-xs" id="result-date"></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="result-periods"></div>
                </div>
                <div id="search-error" class="mt-6 text-center hidden">
                    <div class="inline-flex items-center gap-2 px-3 py-1.5 bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 rounded-full text-xs font-bold"><i class="fas fa-info-circle"></i> Siswa tidak ditemukan.</div>
                </div>
            </div>
        </section>

        <!-- Login Section -->
        <section id="view-login" class="hidden min-h-[70vh] flex items-center justify-center animate-in">
            <div class="w-full max-w-sm">
                <div class="bg-white dark:bg-darkCard p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 text-center">
                    <div class="w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center text-white mx-auto mb-6 shadow-md">
                        <i class="fas fa-lock text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-6 dark:text-white">Portal Staff</h2>
                    <form id="login-form" onsubmit="event.preventDefault(); handleLogin();" class="space-y-4 text-left">
                        <input type="text" id="login-username" placeholder="Username / NIP" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 dark:text-white focus:border-primary-500 outline-none text-sm font-semibold">
                        <input type="password" id="login-password" placeholder="Password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 dark:text-white focus:border-primary-500 outline-none text-sm font-semibold">
                        <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-black py-3 rounded-xl shadow-md text-sm active:scale-95">Masuk</button>
                        <p id="login-error" class="text-rose-500 text-xs font-bold text-center hidden">Login Gagal!</p>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script>
        const GOOGLE_MACRO_URL = "https://script.google.com/macros/s/AKfycbxG6Hi_Lm-qzzzxRk87KpOFSfdIn5_GSTNHiS5T1QlxgBkmtTX_pDSBIImLClPvLpEaPg/exec"; 
        // Simpan URL ke localStorage agar file lain dapat membacanya
        localStorage.setItem('GOOGLE_MACRO_URL', GOOGLE_MACRO_URL);

        let db = { users: [], subjects: [], students: [], attendance: [], classLogs: [] };
        
        const getTodayStr = () => {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
        };
        const extractDate = (dateVal) => {
            if (!dateVal) return ''; let d = String(dateVal); return d.includes('T') ? d.split('T')[0] : d.trim();
        };

        function toggleTheme() {
            const html = document.documentElement; html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const icon = document.getElementById('theme-icon');
            if(icon) { if(isDark) icon.classList.replace('fa-moon', 'fa-sun'); else icon.classList.replace('fa-sun', 'fa-moon'); }
        }

        window.onload = async () => {
            const localDb = localStorage.getItem('absensi_db');
            if (localDb) db = JSON.parse(localDb);
            
            const currentUser = JSON.parse(sessionStorage.getItem('absensi_user'));
            if (currentUser) {
                window.location.href = currentUser.role + '.html'; // Redirect otomatis jika sudah login
                return;
            }
            fetchInitialData();
        };

        async function fetchInitialData() {
            try {
                const response = await fetch(GOOGLE_MACRO_URL + "?action=getAllData");
                const result = await response.json();
                db.users = (result.users || []).map(u => ({ ...u, id: String(u.id), username: String(u.username || u.Username || ''), password: String(u.password || u.Password || ''), role: String(u.role || u.Role || '').toLowerCase(), name: u.name || u.Nama || 'Staff', mapel_id: u.mapel_id || u.Mapel_id || '' }));
                db.subjects = (result.subjects || []).map(m => ({ ...m, id: String(m.id), name: m.name || m.Nama || 'Tanpa Nama' }));
                db.students = (result.students || []).map(s => ({ ...s, id: String(s.id && s.id !== 'undefined' ? s.id : (s.nis || s.NIS || 's'+Math.random())), nis: String(s.nis || s.NIS || ''), name: s.name || s.Nama || s['Nama Lengkap'] || 'Siswa', class: s.class || s.Kelas || s.kelas || '' }));
                db.attendance = (result.attendance || []).map(a => ({ ...a, date: extractDate(a.date || a.tanggal), period: String(a.period || a.jam || ''), status: a.status || a.Status || '' }));
                localStorage.setItem('absensi_db', JSON.stringify(db));
            } catch (err) { console.error("Cloud sync fail:", err); }
        }

        function navigate(viewId) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-login').classList.add('hidden');
            const target = document.getElementById('view-' + viewId);
            if (target) { target.classList.remove('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        }

        function handleLogin() {
            const u = document.getElementById('login-username').value.trim(), p = document.getElementById('login-password').value;
            const user = db.users.find(x => x.username === u && x.password === p);
            if (user) { 
                sessionStorage.setItem('absensi_user', JSON.stringify(user)); 
                window.location.href = user.role + '.html'; // Arahkan ke role html
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function searchStudent() {
            const q = document.getElementById('search-input').value.toLowerCase().trim();
            const student = db.students.find(s => String(s.nis) === q || s.name.toLowerCase().includes(q));
            const results = document.getElementById('search-results'), err = document.getElementById('search-error');
            if (student) {
                err.classList.add('hidden'); results.classList.remove('hidden');
                document.getElementById('result-name').textContent = student.name;
                document.getElementById('result-nis').textContent = student.nis;
                document.getElementById('result-class').textContent = student.class;
                document.getElementById('result-date').textContent = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                const container = document.getElementById('result-periods'); container.innerHTML = '';
                for(let i=1; i<=8; i++) {
                    const att = db.attendance.find(a => String(a.student_id) === String(student.id) && a.date === getTodayStr() && String(a.period) === String(i));
                    const mapel = att ? db.subjects.find(m => m.id === att.mapel_id) : null;
                    let color = "bg-slate-50 dark:bg-slate-800 text-slate-300"; let label = "Kosong";
                    if(att) {
                        if(att.status === 'H') { color = "bg-green-500 text-white shadow-sm"; label = "Hadir"; }
                        else if(att.status === 'I') { color = "bg-blue-500 text-white shadow-sm"; label = "Izin"; }
                        else if(att.status === 'S') { color = "bg-yellow-500 text-white shadow-sm"; label = "Sakit"; }
                        else if(att.status === 'A') { color = "bg-rose-500 text-white shadow-sm"; label = "Alpa"; }
                    }
                    container.innerHTML += `<div class="p-3 rounded-2xl border border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-900/50 flex flex-col items-center gap-1.5 transition-transform hover:scale-105 shadow-sm"><span class="text-[9px] font-bold uppercase text-slate-400">Jam ${i}</span><div class="w-full py-1.5 rounded-lg text-center text-[10px] font-black uppercase tracking-wider ${color}">${label}</div><p class="text-[9px] font-medium text-slate-500 truncate w-full text-center h-3">${mapel?mapel.name:''}</p></div>`;
                }
            } else { results.classList.add('hidden'); err.classList.remove('hidden'); }
        }

        function showToast(m) {
            const t = document.getElementById('toast'), msg = document.getElementById('toast-message');
            if (t && msg) { msg.textContent = m; t.classList.replace('translate-y-20', 'translate-y-0'); t.classList.replace('opacity-0', 'opacity-100'); t.classList.remove('pointer-events-none'); setTimeout(() => { t.classList.replace('translate-y-0', 'translate-y-20'); t.classList.replace('opacity-100', 'opacity-0'); t.classList.add('pointer-events-none'); }, 3000); }
        }
    </script>
</body>
</html>
